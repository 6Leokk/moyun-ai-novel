# 启动前必须设置环境变量:
#   export DB_PASSWORD=xxx JWT_SECRET=xxx ENCRYPTION_KEY=xxx
# 或创建 .env 文件 (docker compose 自动读取)

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: moyun
      POSTGRES_USER: moyun
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moyun"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./ai-novel-backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://moyun:${DB_PASSWORD}@postgres:5432/moyun
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@moyun.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      PORT: "3000"
      NODE_ENV: production
      DB_POOL_MIN: "2"
      DB_POOL_MAX: "20"
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  pgdata:
